<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aibou demo — Minesweeper + Nagi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 {
      font-size: 14px;
      color: #666;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    #app {
      display: flex;
      gap: 24px;
      align-items: stretch;
      max-width: 1024px;
      width: 100%;
    }

    /* Board — 55% */
    #board-container {
      flex: 55;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    #controls button {
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    #controls button:hover { border-color: #7c5cbf; }

    #status {
      font-size: 12px;
      color: #888;
    }

    #board {
      display: inline-grid;
      gap: 1px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 2px;
      user-select: none;
    }

    .cell {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.1s;
    }

    .cell.hidden {
      background: #2a2a3e;
    }
    .cell.hidden:hover {
      background: #3a3a4e;
    }

    .cell.revealed {
      background: #12121e;
      cursor: default;
    }

    .cell.mine {
      background: #3d1515;
      color: #ff4444;
    }

    .cell.flagged {
      background: #2a2a3e;
      color: #ff8800;
    }

    .cell[data-n="1"] { color: #5b9bd5; }
    .cell[data-n="2"] { color: #6bc76b; }
    .cell[data-n="3"] { color: #e05555; }
    .cell[data-n="4"] { color: #7b68ee; }
    .cell[data-n="5"] { color: #cd853f; }
    .cell[data-n="6"] { color: #48d1cc; }
    .cell[data-n="7"] { color: #888; }
    .cell[data-n="8"] { color: #ccc; }

    /* Right panel — 45% */
    #companion-panel {
      flex: 45;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 280px;
      max-width: 400px;
    }

    /* Avatar section */
    #companion-avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
    }

    #companion-avatar {
      flex-shrink: 0;
      filter: drop-shadow(0 0 18px rgba(124, 92, 191, 0.35)) drop-shadow(0 0 40px rgba(90, 130, 220, 0.18));
    }

    #companion-avatar .bunshin-face {
      transform: scaleX(-1);
    }

    #companion-emotion {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    /* Messages */
    #messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 8px;
      width: 100%;
    }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      transition: opacity 0.4s ease, transform 0.4s ease, font-size 0.4s ease;
    }

    .message.companion {
      background: #1a1a2e;
      border-left: 3px solid #7c5cbf;
    }

    /* Past companion messages — faded */
    .message.companion.past {
      opacity: 0.45;
      transform: scale(0.97);
      border-left-color: #3a3050;
      font-size: 12px;
    }

    /* Latest companion message — prominent */
    .message.companion.latest {
      opacity: 1;
      border-left-color: #9d7de8;
      background: #1e1a32;
      font-size: 15px;
      color: #f0eaf8;
      border-left-width: 4px;
      padding: 12px 16px;
      animation: fadeInLatest 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Player messages */
    .message.system {
      background: #12121e;
      color: #888;
      font-size: 12px;
      padding: 8px 14px;
      border-right: 3px solid #444;
      text-align: right;
    }

    .message.system.past {
      opacity: 0.45;
      font-size: 11px;
    }

    .message.system.latest {
      opacity: 1;
      color: #bbb;
      border-right-color: #666;
      animation: fadeInLatest 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Input */
    #player-input {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      width: 100%;
    }

    #player-input input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    #player-input input:focus { border-color: #7c5cbf; }

    #player-input button {
      background: #7c5cbf;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    @keyframes fadeInLatest {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .mode-indicator {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
    }

    .mode-toggle {
      font-size: 11px;
      color: #7c5cbf;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      text-decoration: underline;
    }

    /* Footer */
    #protocol-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: #e0e0e0;
      opacity: 0.35;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <h1>aibou demo</h1>
  <div id="app">
    <div id="board-container">
      <div id="controls">
        <button id="new-game">New Game</button>
        <span id="status">9×9 · 10 mines</span>
        <span class="mode-indicator">right-click: flag</span>
      </div>
      <div id="board"></div>
    </div>
    <div id="companion-panel">
      <div id="companion-avatar-section">
        <div id="companion-avatar"></div>
        <div id="companion-emotion">connected</div>
      </div>
      <div id="messages"></div>
      <div id="player-input">
        <input type="text" placeholder="Talk to Nagi..." id="chat-input" />
        <button id="chat-send">&rarr;</button>
      </div>
    </div>
  </div>
  <div id="protocol-footer">
    Nagi runs on @aibou-dev/core — an open protocol.<br />
    Swap the game. Swap the AI. Swap the character.
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

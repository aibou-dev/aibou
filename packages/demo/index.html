<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aibou demo — Minesweeper + Nagi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    h1 {
      font-size: 14px;
      color: #666;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    #app {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      max-width: 900px;
    }

    /* Board */
    #board-container {
      flex-shrink: 0;
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    #controls button {
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    #controls button:hover { border-color: #7c5cbf; }

    #status {
      font-size: 12px;
      color: #888;
    }

    #board {
      display: inline-grid;
      gap: 1px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 2px;
      user-select: none;
    }

    .cell {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.1s;
    }

    .cell.hidden {
      background: #2a2a3e;
    }
    .cell.hidden:hover {
      background: #3a3a4e;
    }

    .cell.revealed {
      background: #12121e;
      cursor: default;
    }

    .cell.mine {
      background: #3d1515;
      color: #ff4444;
    }

    .cell.flagged {
      background: #2a2a3e;
      color: #ff8800;
    }

    .cell[data-n="1"] { color: #5b9bd5; }
    .cell[data-n="2"] { color: #6bc76b; }
    .cell[data-n="3"] { color: #e05555; }
    .cell[data-n="4"] { color: #7b68ee; }
    .cell[data-n="5"] { color: #cd853f; }
    .cell[data-n="6"] { color: #48d1cc; }
    .cell[data-n="7"] { color: #888; }
    .cell[data-n="8"] { color: #ccc; }

    /* Companion panel */
    #companion {
      flex: 1;
      min-width: 280px;
      max-width: 340px;
    }

    #companion-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    #companion-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid #7c5cbf;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #companion-name {
      font-size: 16px;
      font-weight: bold;
      color: #c4a7e7;
    }

    #companion-emotion {
      font-size: 11px;
      color: #666;
    }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    .message.companion {
      background: #1a1a2e;
      border-left: 3px solid #7c5cbf;
    }

    .message.system {
      background: transparent;
      color: #555;
      font-size: 11px;
      padding: 4px 14px;
      text-align: center;
    }

    #player-input {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    #player-input input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    #player-input input:focus { border-color: #7c5cbf; }

    #player-input button {
      background: #7c5cbf;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .mode-indicator {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
    }

    .mode-toggle {
      font-size: 11px;
      color: #7c5cbf;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>aibou demo</h1>
  <div id="app">
    <div id="board-container">
      <div id="controls">
        <button id="new-game">New Game</button>
        <span id="status">9×9 · 10 mines</span>
        <span class="mode-indicator">右クリック: フラグ</span>
      </div>
      <div id="board"></div>
    </div>
    <div id="companion">
      <div id="companion-header">
        <div id="companion-avatar">凪</div>
        <div>
          <div id="companion-name">Nagi</div>
          <div id="companion-emotion">connected</div>
        </div>
      </div>
      <div id="messages"></div>
      <div id="player-input">
        <input type="text" placeholder="Talk to Nagi..." id="chat-input" />
        <button id="chat-send">→</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
